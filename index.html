<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon TCG Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --yellow: #FFD700;
    --blue: #2A75BB;
    --red: #CC0000;
    --dark: #0D0D0D;
    --surface: #141414;
    --card: #1A1A1A;
    --border: #2A2A2A;
    --muted: #555;
    --text: #E8E8E8;
    --sub: #888;
    --mono: 'Space Mono', monospace;
    --main: 'Rajdhani', sans-serif;
  }
  body { background: var(--dark); color: var(--text); font-family: var(--main); font-size: 15px; min-height: 100vh; }

  /* SYNC */
  #sync {
    position: fixed; top: 10px; right: 14px; z-index: 999;
    font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
    padding: 4px 10px; border-radius: 4px; transition: all 0.3s;
  }
  #sync.loading { background: rgba(255,215,0,0.08); color: var(--yellow); border: 1px solid rgba(255,215,0,0.2); }
  #sync.syncing { background: rgba(42,117,187,0.15); color: #60a5fa; border: 1px solid rgba(42,117,187,0.3); }
  #sync.saved   { background: rgba(34,197,94,0.1);  color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
  #sync.error   { background: rgba(204,0,0,0.1);    color: #f87171; border: 1px solid rgba(204,0,0,0.25); }

  /* HEADER */
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .pokeball {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(180deg, var(--red) 50%, white 50%);
    border: 2px solid #333; position: relative;
  }
  .pokeball::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); width: 7px; height: 7px;
    background: white; border-radius: 50%; border: 2px solid #333;
  }
  .header h1 { font-size: 17px; font-weight: 700; letter-spacing: 2px; color: var(--yellow); text-transform: uppercase; }
  .header h1 span { color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .fx-wrap {
    display: flex; align-items: center; gap: 7px;
    background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px;
  }
  .fx-wrap label { font-size: 11px; color: var(--sub); letter-spacing: 1px; white-space: nowrap; }
  .fx-wrap input {
    background: transparent; border: none; color: var(--yellow);
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    width: 68px; text-align: right; outline: none;
  }
  .fx-wrap input::-webkit-inner-spin-button { display: none; }

  .btn-admin {
    background: transparent; border: 1px solid var(--yellow); border-radius: 6px;
    color: var(--yellow); font-family: var(--mono); font-size: 11px;
    padding: 5px 12px; cursor: pointer; letter-spacing: 1px; transition: all 0.15s; white-space: nowrap;
  }
  .btn-admin:hover { background: var(--yellow); color: #000; }

  /* METRICS */
  .metrics {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
    gap: 10px; padding: 14px 20px;
  }
  .metric { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; }
  .metric.y { border-left: 3px solid var(--yellow); }
  .metric.b { border-left: 3px solid var(--blue); }
  .metric.r { border-left: 3px solid var(--red); }
  .metric.g { border-left: 3px solid #22c55e; }
  .metric-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--sub); margin-bottom: 3px; }
  .metric-val { font-family: var(--mono); font-size: 15px; font-weight: 700; }
  .metric-val.y { color: var(--yellow); }
  .metric-val.b { color: #60a5fa; }
  .metric-val.r { color: #f87171; }
  .metric-val.g { color: #4ade80; }

  /* PROGRESS */
  .prog { padding: 0 20px 12px; }
  .prog-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; font-size: 11px; letter-spacing: 1px; color: var(--sub); text-transform: uppercase; }
  .prog-pct { font-family: var(--mono); font-weight: 700; color: var(--yellow); font-size: 13px; }
  .prog-bg { height: 9px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, var(--blue), var(--yellow)); transition: width 0.4s; }
  .prog-fill.done { background: linear-gradient(90deg, #22c55e, #4ade80); }

  /* NET BANNER */
  .net {
    margin: 0 20px 12px; background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.25); border-radius: 8px;
    padding: 9px 16px; display: none; align-items: center; justify-content: space-between;
  }
  .net.on { display: flex; }
  .net-lbl { color: #4ade80; letter-spacing: 1px; text-transform: uppercase; font-size: 11px; }
  .net-val { font-family: var(--mono); font-size: 16px; font-weight: 700; color: #4ade80; }

  .divider { height: 1px; background: var(--border); margin: 0 20px 12px; }

  /* TABLE */
  .tbl-wrap { padding: 0 20px 32px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; padding: 7px 10px;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--sub); border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-weight: 400; white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody tr.sold td { opacity: 0.4; text-decoration: line-through; text-decoration-color: var(--muted); }
  tbody td { padding: 8px 10px; vertical-align: middle; }

  /* thumbnail cell */
  .td-img { width: 44px; padding: 5px 8px 5px 10px !important; }
  .thumb-wrap {
    width: 36px; height: 50px; border-radius: 4px; overflow: hidden;
    background: #111; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-ph {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  }
  .thumb-ph svg { opacity: 0.25; }

  .td-name { min-width: 150px; }
  .item-name { font-weight: 600; font-size: 13px; }

  .td-num { white-space: nowrap; }
  .p-usd { font-family: var(--mono); font-size: 12px; color: var(--sub); }
  .p-ars { font-family: var(--mono); font-size: 12px; color: #60a5fa; }

  .sale-inp {
    background: transparent; border: 1px solid var(--border); border-radius: 4px;
    color: var(--yellow); font-family: var(--mono); font-size: 12px;
    width: 95px; padding: 3px 7px; text-align: right; outline: none; transition: border-color 0.2s;
  }
  .sale-inp:focus { border-color: var(--yellow); }
  .sale-inp::-webkit-inner-spin-button { display: none; }

  .res { font-family: var(--mono); font-size: 12px; }
  .pos { color: #4ade80; }
  .neg { color: #f87171; }
  .na  { color: var(--muted); }

  .chk-cell { width: 36px; text-align: center; }
  input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--yellow); cursor: pointer; }

  .tcg-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 4px;
    color: var(--blue); font-family: var(--mono); font-size: 9px;
    padding: 3px 6px; cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .tcg-btn:hover { background: var(--blue); color: white; border-color: var(--blue); }

  /* MODAL */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center; z-index: 1000; padding: 20px; display: none;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; width: 100%; max-width: 540px; max-height: 88vh; overflow-y: auto;
  }
  .modal-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--surface); z-index: 1;
  }
  .modal-hd h2 { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--yellow); }
  .modal-close { background: transparent; border: none; color: var(--sub); font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 18px 20px; }

  .msec { margin-bottom: 22px; }
  .msec h3 { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--sub); margin-bottom: 10px; }
  .mrow { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 9px; }
  .mgroup { display: flex; flex-direction: column; gap: 3px; }
  .mgroup.full { grid-column: 1/-1; }
  .mlabel { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--sub); }
  .minput {
    background: var(--card); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 6px 9px; outline: none; transition: border-color 0.2s; width: 100%;
  }
  .minput:focus { border-color: var(--yellow); }
  .minput::-webkit-inner-spin-button { display: none; }
  .mbtn {
    width: 100%; background: var(--yellow); border: none; border-radius: 5px;
    color: #000; font-family: var(--mono); font-size: 12px; font-weight: 700;
    padding: 9px; cursor: pointer; letter-spacing: 1px; transition: opacity 0.15s;
  }
  .mbtn:hover { opacity: 0.85; }
  .mbtn-sm { width: auto; padding: 8px 16px; }

  .alist { display: flex; flex-direction: column; gap: 7px; }
  .aitem {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 7px; padding: 9px 11px; display: flex; align-items: center; gap: 9px;
  }
  .ainfo { flex: 1; min-width: 0; }
  .aname { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ameta { font-family: var(--mono); font-size: 10px; color: var(--sub); margin-top: 1px; }
  .abtns { display: flex; gap: 5px; flex-shrink: 0; }
  .bedit, .bdel {
    background: transparent; border-radius: 4px; font-family: var(--mono);
    font-size: 10px; padding: 3px 7px; cursor: pointer; border: 1px solid; transition: all 0.15s;
  }
  .bedit { border-color: var(--blue); color: var(--blue); }
  .bedit:hover { background: var(--blue); color: white; }
  .bdel  { border-color: var(--red);  color: #f87171; }
  .bdel:hover  { background: var(--red);  color: white; }
  .aedit {
    background: var(--card); border: 1px solid var(--yellow);
    border-radius: 7px; padding: 11px; display: flex; flex-direction: column; gap: 8px;
  }
  .erow { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .esave {
    background: var(--yellow); border: none; border-radius: 4px;
    color: #000; font-family: var(--mono); font-size: 11px; font-weight: 700;
    padding: 6px; cursor: pointer; flex: 1;
  }
  .ecancel {
    background: transparent; border: 1px solid var(--border); border-radius: 4px;
    color: var(--sub); font-family: var(--mono); font-size: 11px;
    padding: 6px; cursor: pointer; flex: 1;
  }
</style>
</head>
<body>

<div id="sync" class="loading">CARGANDO...</div>

<div class="header">
  <div class="header-left">
    <div class="pokeball"></div>
    <h1>Pokémon <span>TCG Tracker</span></h1>
  </div>
  <div class="header-right">
    <div class="fx-wrap">
      <label>1 USD =</label>
      <input type="number" id="fxRate" value="1420" step="10" min="100" />
      <label style="color:var(--text);font-size:12px;">ARS</label>
    </div>
    <button class="btn-admin" onclick="openAdmin()">⚙ ADMIN</button>
  </div>
</div>

<div class="metrics" id="metrics"></div>

<div class="prog">
  <div class="prog-hd">
    <span>Progreso al break-even</span>
    <span class="prog-pct" id="pct">0%</span>
  </div>
  <div class="prog-bg"><div class="prog-fill" id="bar" style="width:0%"></div></div>
</div>

<div class="net" id="netBanner">
  <span class="net-lbl">🏆 Break-even superado — Ganancia neta</span>
  <span class="net-val" id="netVal">$0</span>
</div>

<div class="divider"></div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th class="td-img"></th>
        <th>Ítem</th>
        <th>Costo USD</th>
        <th>Costo ARS</th>
        <th>Precio Venta</th>
        <th>Resultado</th>
        <th class="chk-cell">Vend.</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- Modal Admin -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-hd">
      <h2>⚙ Panel de Admin</h2>
      <button class="modal-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="modal-body">

      <div class="msec">
        <h3>Inversión total</h3>
        <div style="display:flex;gap:8px;align-items:center;">
          <input class="minput" type="number" id="totalInp" step="1000" style="flex:1;" />
          <button class="mbtn mbtn-sm" onclick="saveTotal()">GUARDAR</button>
        </div>
      </div>

      <div class="msec">
        <h3>Agregar ítem</h3>
        <div class="mrow">
          <div class="mgroup full">
            <span class="mlabel">Nombre</span>
            <input class="minput" type="text" id="nName" placeholder="Ej: Charizard ex SAR" />
          </div>
          <div class="mgroup">
            <span class="mlabel">Costo USD</span>
            <input class="minput" type="number" id="nUsd" placeholder="0" step="0.5" />
          </div>
          <div class="mgroup">
            <span class="mlabel">Venta ARS (opcional)</span>
            <input class="minput" type="number" id="nSale" placeholder="0" step="500" />
          </div>
        </div>
        <button class="mbtn" onclick="addItem()">+ AGREGAR</button>
      </div>

      <div class="msec">
        <h3>Ítems actuales</h3>
        <div class="alist" id="alist"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const FB = {
    apiKey: "AIzaSyARc8YGT3ucKMp5qQvxFDN4kqXCeI9Ez9c",
    authDomain: "tcg-tracker-f5efc.firebaseapp.com",
    projectId: "tcg-tracker-f5efc",
    storageBucket: "tcg-tracker-f5efc.firebasestorage.app",
    messagingSenderId: "412361471619",
    appId: "1:412361471619:web:1d19ace31ad59e47120db6"
  };
  const db     = getFirestore(initializeApp(FB));
  const DOCREF = doc(db, "tracker", "estado");

  let inv = 273610, nextId = 14, saveTimer = null, editId = null;
  const imgCache = {};

  const DEFAULT = [
    { id:0,  name:"Pack Charm Clefairy",          usd:14, sale:20000, sold:false },
    { id:1,  name:"Pack Charm Gastly/Gengar",      usd:14, sale:35000, sold:false },
    { id:2,  name:"Pack Charm Eeveelutions",       usd:17, sale:65000, sold:false },
    { id:3,  name:"Poliwhirl AR 151",             usd:9,  sale:null,  sold:false },
    { id:4,  name:"Ivysaur AR 151",              usd:7,  sale:null,  sold:false },
    { id:5,  name:"Lapras AR",                   usd:10, sale:null,  sold:false },
    { id:6,  name:"Pikachu Promo Set x2",        usd:8,  sale:null,  sold:false },
    { id:7,  name:"Pikachu Promo 001/SV-P",      usd:10, sale:null,  sold:false },
    { id:8,  name:"Pack Rocket Meowth/Persian",  usd:17, sale:null,  sold:false },
    { id:9,  name:"Cleffa AR",                   usd:6,  sale:null,  sold:false },
    { id:10, name:"Nidoking/Caterpie/Tangela AR",usd:10, sale:null,  sold:false },
    { id:11, name:"Horsea AR",                   usd:5,  sale:null,  sold:false },
    { id:12, name:"Persian Vintage",             usd:4,  sale:null,  sold:false },
    { id:13, name:"Wobbuffet/Kangaskhan",        usd:11, sale:null,  sold:false },
  ];
  let state = DEFAULT.map(x => ({...x}));

  const syncEl = document.getElementById('sync');
  const ss = (m,t) => { syncEl.className = m; syncEl.textContent = t; };
  const fmt = n => '$' + Math.round(n).toLocaleString('es-AR');
  const fx  = () => parseFloat(document.getElementById('fxRate').value) || 1420;

  // Pokemon name extraction for API
  function pokeName(name) {
    const cleaned = name
      .replace(/pack charm\s*/i,'')
      .replace(/\bAR\b.*$/i,'')
      .replace(/\bpromo\b.*/i,'')
      .replace(/vintage/i,'')
      .replace(/set x\d+/i,'')
      .replace(/\d{3}\/sv-p/i,'')
      .replace(/[/,]/g,' ')
      .trim();
    // take first word that's at least 3 chars
    const words = cleaned.split(/\s+/).filter(w => w.length >= 3);
    return words[0] || '';
  }

  async function getImg(name) {
    if (name in imgCache) return imgCache[name];
    imgCache[name] = null; // prevent double fetch
    const q = pokeName(name);
    if (!q) return null;
    try {
      const r = await fetch(`https://api.pokemontcg.io/v2/cards?q=name:"${encodeURIComponent(q)}"&pageSize=1&select=images`);
      if (!r.ok) return null;
      const d = await r.json();
      const url = d?.data?.[0]?.images?.small ?? null;
      imgCache[name] = url;
      return url;
    } catch { return null; }
  }

  function scheduleSave() {
    ss('syncing','↑ GUARDANDO...');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try {
        await setDoc(DOCREF, { fxRate: fx(), inv, state, nextId, ts: new Date().toISOString() });
        ss('saved','● SINCRONIZADO');
      } catch { ss('error','✕ ERROR'); }
    }, 1200);
  }

  async function load() {
    ss('loading','CARGANDO...');
    try {
      const snap = await getDoc(DOCREF);
      if (snap.exists()) {
        const d = snap.data();
        if (d.fxRate)  document.getElementById('fxRate').value = d.fxRate;
        if (d.inv)     inv = d.inv;
        if (d.state?.length) state = d.state;
        if (d.nextId)  nextId = d.nextId;
      }
      ss('saved','● SINCRONIZADO');
    } catch { ss('error','✕ ERROR DE CONEXIÓN'); }
    render();
  }

  function render() {
    const rate = fx();
    let rec = 0;
    state.forEach(it => { if (it.sold && it.sale) rec += parseFloat(it.sale)||0; });
    const falta   = Math.max(0, inv - rec);
    const pct     = Math.min(100, Math.round(rec/inv*100));
    const over    = rec > inv;
    const ganancia = over ? rec - inv : 0;

    document.getElementById('metrics').innerHTML = `
      <div class="metric y"><div class="metric-label">Inversión Total</div><div class="metric-val y">${fmt(inv)}</div></div>
      <div class="metric b"><div class="metric-label">Recuperado</div><div class="metric-val b">${fmt(rec)}</div></div>
      <div class="metric r"><div class="metric-label">Falta para B.E.</div><div class="metric-val r">${fmt(falta)}</div></div>
      <div class="metric g"><div class="metric-label">Ganancia Neta</div><div class="metric-val g">${fmt(ganancia)}</div></div>`;

    document.getElementById('pct').textContent = pct + '%';
    const bar = document.getElementById('bar');
    bar.style.width = pct + '%';
    bar.className = 'prog-fill' + (over ? ' done' : '');

    const nb = document.getElementById('netBanner');
    if (over) { nb.classList.add('on'); document.getElementById('netVal').textContent = fmt(ganancia); }
    else nb.classList.remove('on');

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    state.forEach(it => {
      const cArs  = Math.round(it.usd * rate);
      const sNum  = it.sale ? parseFloat(it.sale) : 0;
      const diff  = sNum > 0 ? sNum - cArs : null;
      const resHtml = diff === null
        ? `<span class="na">—</span>`
        : `<span class="${diff>=0?'pos':'neg'}">${diff>=0?'+':''}${fmt(diff)}</span>`;
      const tcgUrl = `https://www.tcgplayer.com/search/pokemon/product?q=${encodeURIComponent(it.name)}`;

      const tr = document.createElement('tr');
      if (it.sold) tr.classList.add('sold');

      // thumb cell — placeholder svg first
      const thumbTd = document.createElement('td');
      thumbTd.className = 'td-img';
      thumbTd.innerHTML = `
        <div class="thumb-wrap" id="th-${it.id}">
          <div class="thumb-ph">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="10" r="9" stroke="#FFD700" stroke-width="1.5"/>
              <path d="M1 10h18M10 10.5a.5.5 0 110-1 .5.5 0 010 1z" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
        </div>`;

      tr.appendChild(thumbTd);

      const rest = document.createElement('td');
      rest.setAttribute('colspan','7');
      rest.innerHTML = `
        <table style="width:100%;border-collapse:collapse;"><tr>
          <td class="td-name"><span class="item-name">${it.name}</span></td>
          <td class="td-num"><span class="p-usd">$${it.usd}</span></td>
          <td class="td-num"><span class="p-ars">${fmt(cArs)}</span></td>
          <td><input type="number" class="sale-inp" value="${it.sale ?? ''}" placeholder="0" step="500" data-id="${it.id}" /></td>
          <td class="td-num res">${resHtml}</td>
          <td class="chk-cell"><input type="checkbox" ${it.sold?'checked':''} data-id="${it.id}" /></td>
          <td><button class="tcg-btn" onclick="window.open('${tcgUrl}','_blank')">TCG ↗</button></td>
        </tr></table>`;
      tr.appendChild(rest);
      tbody.appendChild(tr);

      // load image async → inject into placeholder
      getImg(it.name).then(url => {
        const wrap = document.getElementById('th-' + it.id);
        if (wrap && url) wrap.innerHTML = `<img src="${url}" alt="${it.name}" loading="lazy" />`;
      });
    });

    tbody.querySelectorAll('input[type=checkbox]').forEach(c => {
      c.addEventListener('change', e => {
        const idx = state.findIndex(x => x.id === +e.target.dataset.id);
        if (idx >= 0) { state[idx].sold = e.target.checked; scheduleSave(); render(); }
      });
    });
    tbody.querySelectorAll('.sale-inp').forEach(i => {
      i.addEventListener('input', e => {
        const idx = state.findIndex(x => x.id === +e.target.dataset.id);
        if (idx >= 0) { const v=parseFloat(e.target.value); state[idx].sale=isNaN(v)?null:v; scheduleSave(); render(); }
      });
    });
  }

  // ---- ADMIN ----
  window.openAdmin = () => {
    document.getElementById('totalInp').value = inv;
    renderAlist();
    document.getElementById('modal').classList.add('open');
  };
  window.closeAdmin = () => { document.getElementById('modal').classList.remove('open'); editId=null; };
  window.saveTotal  = () => {
    const v = parseFloat(document.getElementById('totalInp').value);
    if (!isNaN(v)&&v>0){ inv=v; scheduleSave(); render(); }
  };
  window.addItem = () => {
    const name=document.getElementById('nName').value.trim();
    const usd =parseFloat(document.getElementById('nUsd').value);
    const sale=parseFloat(document.getElementById('nSale').value)||null;
    if(!name||isNaN(usd)){ alert('Nombre y USD son obligatorios.'); return; }
    state.push({id:nextId++,name,usd,sale,sold:false});
    document.getElementById('nName').value='';
    document.getElementById('nUsd').value='';
    document.getElementById('nSale').value='';
    scheduleSave(); renderAlist(); render();
  };
  window.delItem = id => {
    if(!confirm('¿Borrar este ítem?')) return;
    state=state.filter(x=>x.id!==id);
    scheduleSave(); renderAlist(); render();
  };
  window.startEdit  = id => { editId=id; renderAlist(); };
  window.cancelEdit = ()  => { editId=null; renderAlist(); };
  window.saveEdit   = id  => {
    const idx=state.findIndex(x=>x.id===id);
    if(idx<0) return;
    const name=document.getElementById(`en${id}`).value.trim();
    const usd =parseFloat(document.getElementById(`eu${id}`).value);
    const sale=parseFloat(document.getElementById(`es${id}`).value)||null;
    if(!name||isNaN(usd)){ alert('Nombre y USD son obligatorios.'); return; }
    const oldName = state[idx].name;
    state[idx]={...state[idx],name,usd,sale};
    if(oldName!==name) delete imgCache[oldName];
    editId=null; scheduleSave(); renderAlist(); render();
  };

  function renderAlist() {
    const rate=fx();
    const list=document.getElementById('alist');
    list.innerHTML='';
    state.forEach(it => {
      const div=document.createElement('div');
      if(editId===it.id){
        div.className='aedit';
        div.innerHTML=`
          <div class="mgroup">
            <span class="mlabel">Nombre</span>
            <input class="minput" id="en${it.id}" type="text" value="${it.name}" />
          </div>
          <div class="erow">
            <div class="mgroup"><span class="mlabel">Costo USD</span>
              <input class="minput" id="eu${it.id}" type="number" value="${it.usd}" step="0.5" /></div>
            <div class="mgroup"><span class="mlabel">Venta ARS</span>
              <input class="minput" id="es${it.id}" type="number" value="${it.sale??''}" step="500" placeholder="Opcional" /></div>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="esave" onclick="saveEdit(${it.id})">GUARDAR</button>
            <button class="ecancel" onclick="cancelEdit()">CANCELAR</button>
          </div>`;
      } else {
        div.className='aitem';
        div.innerHTML=`
          <div class="ainfo">
            <div class="aname">${it.name}</div>
            <div class="ameta">$${it.usd} USD · ${fmt(it.usd*rate)} · ${it.sale?fmt(it.sale):'Sin precio venta'}${it.sold?' · ✓ VENDIDA':''}</div>
          </div>
          <div class="abtns">
            <button class="bedit" onclick="startEdit(${it.id})">EDITAR</button>
            <button class="bdel"  onclick="delItem(${it.id})">BORRAR</button>
          </div>`;
      }
      list.appendChild(div);
    });
  }

  document.getElementById('fxRate').addEventListener('input', ()=>{ scheduleSave(); render(); });
  document.getElementById('modal').addEventListener('click', e=>{ if(e.target===document.getElementById('modal')) closeAdmin(); });

  load();
</script>
</body>
</html>
