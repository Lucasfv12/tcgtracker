<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon TCG Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --poke-yellow: #FFD700;
    --poke-blue: #2A75BB;
    --poke-red: #CC0000;
    --poke-dark: #0D0D0D;
    --poke-surface: #141414;
    --poke-card: #1A1A1A;
    --poke-border: #2A2A2A;
    --poke-muted: #555;
    --poke-text: #E8E8E8;
    --poke-subtext: #888;
    --font-mono: 'Space Mono', monospace;
    --font-main: 'Rajdhani', sans-serif;
  }
  body {
    background: var(--poke-dark);
    color: var(--poke-text);
    font-family: var(--font-main);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Sync indicator */
  #syncStatus {
    position: fixed;
    top: 10px; right: 14px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 4px;
    z-index: 999;
    transition: all 0.3s;
  }
  #syncStatus.syncing { background: rgba(42,117,187,0.15); color: #60a5fa; border: 1px solid rgba(42,117,187,0.3); }
  #syncStatus.saved   { background: rgba(34,197,94,0.1);  color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
  #syncStatus.error   { background: rgba(204,0,0,0.1);    color: #f87171; border: 1px solid rgba(204,0,0,0.25); }
  #syncStatus.loading { background: rgba(255,215,0,0.08); color: var(--poke-yellow); border: 1px solid rgba(255,215,0,0.2); }

  /* Header */
  .header {
    background: var(--poke-surface);
    border-bottom: 1px solid var(--poke-border);
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .pokeball {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--poke-red) 50%, white 50%);
    border: 2px solid #333;
    position: relative;
    flex-shrink: 0;
  }
  .pokeball::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    background: white;
    border-radius: 50%;
    border: 2px solid #333;
  }
  .header h1 {
    font-family: var(--font-main);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--poke-yellow);
    text-transform: uppercase;
  }
  .header h1 span { color: var(--poke-text); }

  .fx-control {
    display: flex; align-items: center; gap: 8px;
    background: var(--poke-card);
    border: 1px solid var(--poke-border);
    border-radius: 6px;
    padding: 6px 10px;
  }
  .fx-control label { font-size: 12px; color: var(--poke-subtext); letter-spacing: 1px; white-space: nowrap; }
  .fx-control input[type=number] {
    background: transparent;
    border: none;
    color: var(--poke-yellow);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    width: 70px;
    text-align: right;
    outline: none;
  }
  .fx-control input[type=number]::-webkit-inner-spin-button { display: none; }

  /* Metrics */
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    padding: 14px 20px;
  }
  .metric {
    background: var(--poke-card);
    border: 1px solid var(--poke-border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .metric.accent-yellow { border-left: 3px solid var(--poke-yellow); }
  .metric.accent-blue   { border-left: 3px solid var(--poke-blue); }
  .metric.accent-red    { border-left: 3px solid var(--poke-red); }
  .metric.accent-green  { border-left: 3px solid #22c55e; }
  .metric-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--poke-subtext);
    margin-bottom: 4px;
  }
  .metric-value {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--poke-text);
    line-height: 1.2;
  }
  .metric-value.yellow { color: var(--poke-yellow); }
  .metric-value.blue   { color: #60a5fa; }
  .metric-value.red    { color: #f87171; }
  .metric-value.green  { color: #4ade80; }

  /* Progress */
  .progress-section { padding: 0 20px 14px; }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--poke-subtext);
    text-transform: uppercase;
  }
  .progress-pct { font-family: var(--font-mono); font-weight: 700; color: var(--poke-yellow); font-size: 14px; }
  .progress-bar-bg {
    height: 10px;
    background: var(--poke-border);
    border-radius: 5px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 5px;
    background: linear-gradient(90deg, var(--poke-blue), var(--poke-yellow));
    transition: width 0.4s ease;
  }
  .progress-bar-fill.done { background: linear-gradient(90deg, #22c55e, #4ade80); }

  /* Net banner */
  .net-banner {
    margin: 0 20px 14px;
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.25);
    border-radius: 8px;
    padding: 10px 16px;
    display: none;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }
  .net-banner.visible { display: flex; }
  .net-label { color: #4ade80; letter-spacing: 1px; text-transform: uppercase; font-size: 11px; }
  .net-value { font-family: var(--font-mono); font-size: 17px; font-weight: 700; color: #4ade80; }

  .divider { height: 1px; background: var(--poke-border); margin: 0 20px 14px; }

  /* Table */
  .table-wrap { padding: 0 20px 32px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  thead th {
    text-align: left;
    padding: 8px 10px;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--poke-subtext);
    border-bottom: 1px solid var(--poke-border);
    font-family: var(--font-mono);
    font-weight: 400;
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--poke-border);
    transition: background 0.15s;
  }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody tr.sold { opacity: 0.45; text-decoration: line-through; text-decoration-color: var(--poke-muted); }
  tbody td { padding: 9px 10px; vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-name { font-weight: 600; color: var(--poke-text); font-size: 13px; }
  .price-usd { font-family: var(--font-mono); color: var(--poke-subtext); font-size: 12px; }
  .price-ars { font-family: var(--font-mono); color: #60a5fa; font-size: 12px; }
  .sale-input {
    background: transparent;
    border: 1px solid var(--poke-border);
    border-radius: 4px;
    color: var(--poke-yellow);
    font-family: var(--font-mono);
    font-size: 12px;
    width: 90px;
    padding: 3px 6px;
    text-align: right;
    outline: none;
    transition: border-color 0.2s;
  }
  .sale-input:focus { border-color: var(--poke-yellow); }
  .sale-input::-webkit-inner-spin-button { display: none; }
  .profit-cell { font-family: var(--font-mono); font-size: 12px; }
  .profit-pos { color: #4ade80; }
  .profit-neg { color: #f87171; }
  .profit-na  { color: var(--poke-muted); }
  .search-btn {
    background: transparent;
    border: 1px solid var(--poke-border);
    border-radius: 4px;
    color: var(--poke-blue);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 7px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .search-btn:hover { background: var(--poke-blue); color: white; border-color: var(--poke-blue); }
  .chk-wrap { display: flex; align-items: center; justify-content: center; }
  input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--poke-yellow); cursor: pointer; }

  col.c-chk  { width: 36px; }
  col.c-name { width: auto; }
  col.c-usd  { width: 72px; }
  col.c-ars  { width: 88px; }
  col.c-sale { width: 100px; }
  col.c-prof { width: 88px; }
  col.c-link { width: 84px; }

  /* Mobile */
  @media (max-width: 600px) {
    .header h1 { font-size: 14px; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    col.c-usd, col.c-link { width: 0; display: none; }
    td:nth-child(3), td:nth-child(7),
    th:nth-child(3), th:nth-child(7) { display: none; }
    .sale-input { width: 75px; }
  }
</style>
</head>
<body>

<div id="syncStatus" class="loading">CARGANDO...</div>

<div class="header">
  <div class="header-left">
    <div class="pokeball"></div>
    <h1>Pokémon <span>TCG Tracker</span></h1>
  </div>
  <div class="fx-control">
    <label>1 USD =</label>
    <input type="number" id="fxRate" value="1420" step="10" min="100" />
    <label style="color: var(--poke-text); font-size: 12px;">ARS</label>
  </div>
</div>

<div class="metrics" id="metrics"></div>

<div class="progress-section">
  <div class="progress-header">
    <span>Progreso al break-even</span>
    <span class="progress-pct" id="pctLabel">0%</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>
</div>

<div class="net-banner" id="netBanner">
  <span class="net-label">🏆 Break-even superado — Ganancia neta</span>
  <span class="net-value" id="netValue">$0</span>
</div>

<div class="divider"></div>

<div class="table-wrap">
  <table>
    <colgroup>
      <col class="c-chk"><col class="c-name"><col class="c-usd">
      <col class="c-ars"><col class="c-sale"><col class="c-prof"><col class="c-link">
    </colgroup>
    <thead>
      <tr>
        <th>✓</th>
        <th>Ítem</th>
        <th>USD</th>
        <th>Costo ARS</th>
        <th>Precio Venta</th>
        <th>Resultado</th>
        <th>Buscar</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyARc8YGT3ucKMp5qQvxFDN4kqXCeI9Ez9c",
    authDomain: "tcg-tracker-f5efc.firebaseapp.com",
    projectId: "tcg-tracker-f5efc",
    storageBucket: "tcg-tracker-f5efc.firebasestorage.app",
    messagingSenderId: "412361471619",
    appId: "1:412361471619:web:1d19ace31ad59e47120db6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const DOC_REF = doc(db, "tracker", "estado");
  const TOTAL_INVERTIDO = 273610;

  const ITEMS_DEFAULT = [
    { name: "Pack Charm Clefairy",           usd: 14, sale: 20000 },
    { name: "Pack Charm Gastly/Gengar",       usd: 14, sale: 35000 },
    { name: "Pack Charm Eeveelutions",        usd: 17, sale: 65000 },
    { name: "Poliwhirl AR 151",              usd: 9,  sale: null  },
    { name: "Ivysaur AR 151",               usd: 7,  sale: null  },
    { name: "Lapras AR",                    usd: 10, sale: null  },
    { name: "Pikachu Promo Set x2",         usd: 8,  sale: null  },
    { name: "Pikachu Promo 001/SV-P",       usd: 10, sale: null  },
    { name: "Pack Rocket Meowth/Persian AR", usd: 17, sale: null  },
    { name: "Cleffa AR",                    usd: 6,  sale: null  },
    { name: "Nidoking/Caterpie/Tangela AR", usd: 10, sale: null  },
    { name: "Horsea AR",                    usd: 5,  sale: null  },
    { name: "Persian Vintage",              usd: 4,  sale: null  },
    { name: "Wobbuffet/Kangaskhan",         usd: 11, sale: null  },
  ];

  let state = ITEMS_DEFAULT.map((it, i) => ({ ...it, sold: false, id: i }));
  let fxRate = 1420;
  let saveTimer = null;

  const syncEl = document.getElementById('syncStatus');

  function setSync(mode, text) {
    syncEl.className = mode;
    syncEl.textContent = text;
  }

  // Load from Firestore
  async function loadState() {
    setSync('loading', 'CARGANDO...');
    try {
      const snap = await getDoc(DOC_REF);
      if (snap.exists()) {
        const data = snap.data();
        fxRate = data.fxRate || 1420;
        document.getElementById('fxRate').value = fxRate;
        if (data.items && data.items.length === state.length) {
          data.items.forEach((saved, i) => {
            state[i].sold = saved.sold || false;
            state[i].sale = saved.sale !== undefined ? saved.sale : state[i].sale;
          });
        }
      }
      setSync('saved', '● SINCRONIZADO');
    } catch (e) {
      setSync('error', '✕ ERROR DE CONEXIÓN');
      console.error(e);
    }
    render();
  }

  // Save to Firestore (debounced 1.2s)
  function scheduleSave() {
    setSync('syncing', '↑ GUARDANDO...');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try {
        await setDoc(DOC_REF, {
          fxRate: parseFloat(document.getElementById('fxRate').value) || 1420,
          items: state.map(it => ({ sold: it.sold, sale: it.sale })),
          updatedAt: new Date().toISOString()
        });
        setSync('saved', '● SINCRONIZADO');
      } catch (e) {
        setSync('error', '✕ ERROR AL GUARDAR');
        console.error(e);
      }
    }, 1200);
  }

  function fmt(n) {
    return '$' + Math.round(n).toLocaleString('es-AR');
  }

  function render() {
    const fx = parseFloat(document.getElementById('fxRate').value) || 1420;
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    let totalRecuperado = 0;
    state.forEach(it => {
      if (it.sold && it.sale) totalRecuperado += parseFloat(it.sale) || 0;
    });

    const faltante = Math.max(0, TOTAL_INVERTIDO - totalRecuperado);
    const pct = Math.min(100, Math.round((totalRecuperado / TOTAL_INVERTIDO) * 100));
    const superado = totalRecuperado > TOTAL_INVERTIDO;
    const ganancia = superado ? totalRecuperado - TOTAL_INVERTIDO : 0;

    // Metrics
    document.getElementById('metrics').innerHTML = `
      <div class="metric accent-yellow">
        <div class="metric-label">Inversión Total</div>
        <div class="metric-value yellow">${fmt(TOTAL_INVERTIDO)}</div>
      </div>
      <div class="metric accent-blue">
        <div class="metric-label">Recuperado</div>
        <div class="metric-value blue">${fmt(totalRecuperado)}</div>
      </div>
      <div class="metric accent-red">
        <div class="metric-label">Falta para B.E.</div>
        <div class="metric-value red">${fmt(faltante)}</div>
      </div>
      <div class="metric accent-green">
        <div class="metric-label">Ganancia Neta</div>
        <div class="metric-value green">${fmt(ganancia)}</div>
      </div>
    `;

    // Progress
    document.getElementById('pctLabel').textContent = pct + '%';
    const bar = document.getElementById('progressBar');
    bar.style.width = pct + '%';
    bar.className = 'progress-bar-fill' + (superado ? ' done' : '');

    // Net banner
    const banner = document.getElementById('netBanner');
    if (superado) {
      banner.classList.add('visible');
      document.getElementById('netValue').textContent = fmt(ganancia);
    } else {
      banner.classList.remove('visible');
    }

    // Rows
    state.forEach(it => {
      const costoArs = Math.round(it.usd * fx);
      const tr = document.createElement('tr');
      if (it.sold) tr.classList.add('sold');

      let resultHtml = '<span class="profit-na">—</span>';
      if (it.sale !== null && it.sale !== '' && it.sale !== undefined) {
        const saleNum = parseFloat(it.sale) || 0;
        if (saleNum > 0) {
          const diff = saleNum - costoArs;
          const cls = diff >= 0 ? 'profit-pos' : 'profit-neg';
          const sign = diff >= 0 ? '+' : '';
          resultHtml = `<span class="profit-cell ${cls}">${sign}${fmt(diff)}</span>`;
        }
      }

      const tcgQuery = encodeURIComponent(it.name + ' pokemon card japanese');
      const tcgUrl = `https://www.tcgplayer.com/search/pokemon/product?q=${tcgQuery}`;

      tr.innerHTML = `
        <td class="chk-wrap"><input type="checkbox" ${it.sold ? 'checked' : ''} data-id="${it.id}" /></td>
        <td class="item-name" title="${it.name}">${it.name}</td>
        <td class="price-usd">$${it.usd}</td>
        <td class="price-ars">${fmt(costoArs)}</td>
        <td><input type="number" class="sale-input" value="${(it.sale !== null && it.sale !== undefined) ? it.sale : ''}" placeholder="0" data-id="${it.id}" step="500" /></td>
        <td>${resultHtml}</td>
        <td><button class="search-btn" onclick="window.open('${tcgUrl}','_blank')">TCGPlayer ↗</button></td>
      `;
      tbody.appendChild(tr);
    });

    // Events
    tbody.querySelectorAll('input[type=checkbox]').forEach(chk => {
      chk.addEventListener('change', e => {
        state[parseInt(e.target.dataset.id)].sold = e.target.checked;
        scheduleSave();
        render();
      });
    });
    tbody.querySelectorAll('input.sale-input').forEach(inp => {
      inp.addEventListener('input', e => {
        const v = parseFloat(e.target.value);
        state[parseInt(e.target.dataset.id)].sale = isNaN(v) ? null : v;
        scheduleSave();
        render();
      });
    });
  }

  document.getElementById('fxRate').addEventListener('input', () => {
    scheduleSave();
    render();
  });

  loadState();
</script>
</body>
</html>
